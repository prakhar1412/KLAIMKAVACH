packages:
  "framer-motion": "For premium page transitions, card lift effects, and animated micro-interactions"
  "react-hook-form": "For robust form state management in the registration flow"
  "@hookform/resolvers": "For Zod validation integration with react-hook-form"
  "zod": "For client-side form schema validation"

images:
  - path: "artifacts/klaimKavach/public/images/logo.png"
    description: "Minimal geometric shield logo mark in glowing cyan on transparent background, premium fintech aesthetic"
    aspect_ratio: "1:1"
  - path: "artifacts/klaimKavach/public/images/hero-bg.png"
    description: "Abstract dark background with deep indigo and purple gradient mesh, subtle glassmorphism geometric shapes floating, high-end tech aesthetic"
    aspect_ratio: "16:9"

notes:
  - The application relies on the generated @workspace/api-client-react hooks for all data fetching and mutations.
  - The backend is assumed to be accessible via the relative /api prefix handled by the workspace proxy.
