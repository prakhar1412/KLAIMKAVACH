kind = "web"
previewPath = "/"
title = "Raksha.AI"
version = "1.0.0"
id = "artifacts/raksha-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23271

[services.development]
run = "pnpm --filter @workspace/raksha-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raksha-ai", "run", "build" ]
publicDir = "artifacts/raksha-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23271"
BASE_PATH = "/"
